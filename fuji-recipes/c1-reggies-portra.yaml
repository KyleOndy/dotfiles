# Fujifilm film recipe for helios fuji-recipes restore
# imported from pasted text on 2026-07-14
# source: https://fujixweekly.com/2022/06/11/fujifilm-x-trans-iv-film-simulation-recipe-reggies-portra/
# color_chrome_fx_blue Off per the X-Trans V note:
# https://fujixweekly.com/2025/12/03/reggies-portra-in-x-trans-v-cameras/
# ISO: Auto, up to ISO 6400
name: Reggies Portra
film_simulation: Classic Chrome
dynamic_range: Auto
grain: Weak/Small
color_chrome: Strong
color_chrome_fx_blue: "Off"
white_balance: Auto
wb_shift_r: 2
wb_shift_b: -4
highlight_tone: -1
shadow_tone: -1
color: 2
sharpness: -2
high_iso_nr: -4
clarity: 0
# --- operational defaults added by helios 2026-07-16; review/adjust ---
image_quality: fine+raw
raw_recording: lossless-compressed
image_size: l
aspect_ratio: "3:2"
af_mode: single-point
num_focus_points: 117
af_point_display: "on"
release_priority_afs: focus
release_priority_afc: release
instant_af: af-s
pre_af: "off"
af_mf: "off"
detection: face+eye-auto
d_range_priority: "off"
afc_custom: set1
shutter_type: mechanical
self_timer: "off"
flicker_reduction: first-frame
interlock_spot_ae: "off"
lmo: "on"
# auto-ISO banks: AUTO1 kids/action (1/250), AUTO2 general (auto min), AUTO3 fast (1/500)
auto_iso:
  - default: "125"
    max: "12800"
    min_shutter: 1/250
  - default: "125"
    max: "6400"
    min_shutter: AUTO
  - default: "125"
    max: "12800"
    min_shutter: 1/500
