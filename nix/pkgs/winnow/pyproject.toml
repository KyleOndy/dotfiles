[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "winnow"
version = "0.1.0"
description = "Fast photo viewer for culling JPEG photos"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Kyle", email = "kyle@example.com" }
]
keywords = ["photo", "culling", "viewer", "jpeg", "photography"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Graphics :: Viewers",
]

dependencies = [
    "PySide6>=6.6.0",
    "Pillow>=10.0.0",
    "Send2Trash>=1.8.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0",
    "pytest-qt>=4.2.0",
    "pytest-cov>=4.0.0",
]

[project.scripts]
winnow = "winnow.app:main"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501", # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["winnow"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
qt_api = "pyside6"
log_cli_level = "INFO"

[tool.coverage.run]
source = ["src"]
# ImageCache and Thumbnailer decode on QThreadPool worker threads; without
# this, coverage.py only traces the main thread and silently under-reports
# coverage for anything that runs in the background.
concurrency = ["thread"]
omit = [
    "tests/*",
    "**/__pycache__/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
